<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar sesión — Clínica San Gabriel</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        .login-wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .login-card { background: var(--blanco); border-radius: 16px; box-shadow: var(--sombra-media); padding: 40px; width: 100%; max-width: 400px; }
        .login-logo { width: 60px; height: 60px; background: var(--teal-600); color: #fff; border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 36px; font-weight: 700; margin: 0 auto 20px; }
        .login-card h1 { text-align: center; font-size: 22px; color: var(--teal-900); margin-bottom: 4px; }
        .login-card .sub { text-align: center; color: var(--texto-tenue); font-size: 14px; margin-bottom: 28px; }
    </style>
</head>
<body>
    <div class="login-wrap">
        <div class="login-card">
            <div class="login-logo">+</div>
            <h1>Clínica San Gabriel</h1>
            <p class="sub">Sistema de Gestión de Turnos</p>

            {% with mensajes = get_flashed_messages(with_categories=true) %}
                {% for categoria, mensaje in mensajes %}
                    <div class="flash flash-{{ categoria }}">{{ mensaje }}</div>
                {% endfor %}
            {% endwith %}

            <form action="{{ url_for('login_post') }}" method="POST">
                <div class="campo">
                    <label for="username">Usuario</label>
                    <input type="text" id="username" name="username" autofocus required>
                </div>
                <div class="campo">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" name="password" required>
                </div>
                <button type="submit" class="boton boton-primario" style="width:100%; margin-top:8px;">Ingresar</button>
            </form>
            <p style="text-align:center; font-size:12px; color:var(--texto-tenue); margin-top:20px;">
                Su usuario es su primer nombre y su contraseña su CI.<br>Puede cambiarlos luego desde "Mi cuenta".
            </p>
        </div>
    </div>
</body>
</html>
